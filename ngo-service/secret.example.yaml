# Template de referência — NÃO aplicar diretamente no cluster.
# Crie o Secret real manualmente:
#
# kubectl create secret generic ngo-service-secrets \
#   --namespace solidarytech \
#   --from-literal=DATABASE_URL="postgres://USER:PASS@RDS_ENDPOINT:5432/ngo_db"
#
apiVersion: v1
kind: Secret
metadata:
  name: ngo-service-secrets
  namespace: solidarytech
type: Opaque
stringData:
  DATABASE_URL: "postgres://USER:PASS@RDS_ENDPOINT:5432/ngo_db"
