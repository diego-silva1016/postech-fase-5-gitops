# Template de referência — NÃO aplicar diretamente no cluster.
#
# kubectl create secret generic donation-service-secrets \
#   --namespace solidarytech \
#   --from-literal=DATABASE_URL="postgres://USER:PASS@RDS_ENDPOINT:5432/donation_db"
